kind = "web"
previewPath = "/"
title = "Fidelis Investments"
version = "1.0.0"
id = "artifacts/fidelis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23340

[services.development]
run = "pnpm --filter @workspace/fidelis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fidelis", "run", "build" ]
publicDir = "artifacts/fidelis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23340"
BASE_PATH = "/"
